<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus — To-Do List</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <main class="app">

    <!-- ── Header ── -->
    <header class="app-header">
      <div class="header-meta">
        <span class="app-label">FOCUS</span>
        <span class="current-date" id="currentDate"></span>
      </div>
      <h1 class="app-title">Things To Do</h1>
      <p class="app-subtitle">Dream big. Start small. Act now</p>
    </header>

    <!-- ── Input ── -->
    <section class="input-section" aria-label="Add new task">
      <div class="input-wrapper">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="What do you need to do?"
          maxlength="120"
          autocomplete="off"
          aria-label="New task text"
        />
        <button class="add-btn" id="addBtn" aria-label="Add task">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>Add Task</span>
        </button>
        <div id="message"></div>
      </div>
    </section>

    <!-- ── Stats ── -->
    <div class="stats-row">
      <div class="stat-pill">
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-pill">
        <span class="stat-value" id="pendingCount">0</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat-pill accent">
        <span class="stat-value" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
      <!-- Progress bar -->
      <div class="progress-wrap" aria-label="Completion progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <!-- ── Filters ── -->
    <nav class="filter-nav" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </nav>

    <!-- ── Task List ── -->
    <section class="list-section" aria-label="Task list">
      <ul class="task-list" id="taskList" role="list"></ul>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" aria-live="polite">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <p class="empty-title">All clear!</p>
        <p class="empty-sub">Add a task above to get started.</p>
      </div>
    </section>

    <!-- ── Footer actions ── -->
    <footer class="app-footer">
      <p class="footer-hint">Click to complete &nbsp;·&nbsp; Double-click to delete</p>
      <button class="clear-btn" id="clearcompleted">Clear Completed</button>
      <div id="mesage"></div>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
